# Hermes Desk Bridge — Docker Compose

services:
  hermes-desk-bridge:
    build:
      context: ..
      dockerfile: bridge/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - config/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bridge-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  bridge-data:
